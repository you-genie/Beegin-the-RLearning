<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beegin the RLearning</title>
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <span id="game-title">🐝 Beegin the RLearning</span>
        <span id="level-title"></span>
        <span id="concept"></span>
      </header>
      <nav id="level-nav"></nav>
      <section id="show-panel"></section>
      <main id="workspace">
        <div id="left-pane">
          <div id="editor-pane"></div>
          <div id="docs-box"></div>
          <div id="editor-controls">
            <button id="run-btn">▶ 학습 실행</button>
            <button id="hint-btn">💡 힌트</button>
          </div>
          <div id="hint-box"></div>
        </div>
        <div id="viz-pane">
          <canvas id="canvas" width="520" height="380"></canvas>
          <div id="legend"></div>
          <div id="speed-row">
            <span class="speed-label">slow</span>
            <input id="speed" type="range" min="0.25" max="4" step="0.25" value="1" />
            <span class="speed-label">fast</span>
            <span id="speed-val">×1.0</span>
          </div>
          <div id="status"></div>
          <div id="recap-box"></div>
          <button id="next-btn" disabled>다음 레벨 →</button>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
